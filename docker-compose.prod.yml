services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    
    env_file:
      - .env.production

    restart: unless-stopped

    working_dir: /var/www/html

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    
    env_file:
      - .env.production

    command: php artisan queue:work

    restart: unless-stopped

    working_dir: /var/www/html

    depends_on:
      - redis
      - mysql
  
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    
    env_file:
      - .env.production

    command: php artisan schedule:work

    restart: unless-stopped

    working_dir: /var/www/html

    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: laravel_core_admin

    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8

    restart: unless-stopped
  
  nginx:
    image: nginx:latest

    restart: unless-stopped

    ports:
      - "80:80"
    
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    
    depends_on:
      - app

volumes:
  mysql_data: