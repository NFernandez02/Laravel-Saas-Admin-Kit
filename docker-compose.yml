services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    volumes:
      - .:/var/www/html

    working_dir: /var/www/html

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    command: php artisan queue:work

    volumes:
      - .:/var/www/html

    working_dir: /var/www/html

    depends_on:
      - redis
      - mysql
  
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    command: php artisan schedule:work

    volumes:
      - .:/var/www/html
    
    working_dir: /var/www/html

    depends_on:
      - mysql
      - redis
      
  redis:
    image: redis:8
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.4

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_core_admin
    
    ports:
      - "3306:3306"
    
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:latest

    ports:
      - "8000:80"
      
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

volumes:
  mysql_data: